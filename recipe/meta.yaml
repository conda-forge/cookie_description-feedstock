{% set name = "cookie_description" %}
{% set version = "1.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/cookie_description-{{ version }}.tar.gz
  sha256: 4ee04de1b518dc923edd9629e0bb3dcf446447dbb55e0a5ca582c90d8a399600

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  entry_points:
    - cookie_description = cookie_description.__main__:main

requirements:
  host:
    - python {{ python_min }}
    - flit-core >=2,<4
    - pip
  run:
    - python >={{ python_min }}

test:
  imports:
    - cookie_description
  commands:
    - pip check
    - cookie_description --help 2>&1 | grep -q "Available commands"  # [unix]
    - cookie_description --help 2>&1 | findstr /C:"Available commands" >nul  # [win]
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/cookie_description
  summary: URDF and Xacro descriptions for Cookie wheeled bipeds.
  dev_url: https://codeberg.org/upkie/cookie_description
  license: Apache-2.0
  license_file:
    - NOTICE
    - LICENSE

extra:
  recipe-maintainers:
    - stephane-caron
